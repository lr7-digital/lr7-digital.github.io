<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — Time On Ice</title>
  {% if page.description %}
  <meta name="description" content="{{ page.description }}">
  {% endif %}

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ========================================
       DESIGN TOKENS — "Dark Ice" System
       ======================================== */
    :root {
      --deep-ice: #0A0E14;
      --night-blue: #0D1520;
      --surface-blue: #141E2B;
      --ice-cyan: #00D4FF;
      --cyan-glow: rgba(0, 212, 255, 0.4);
      --cyan-glow-strong: rgba(0, 212, 255, 0.6);
      --frost-grey: #8899AA;
      --bench-grey: #1A1F27;
      --on-ice-white: #FFFFFF;
      --font-display: 'Barlow Condensed', sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
    }

    /* ========================================
       RESET & BASE
       ======================================== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-body);
      background: var(--deep-ice);
      color: #E0E8F0;
      line-height: 1.6;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    img { max-width: 100%; height: auto; display: block; }
    a { color: var(--ice-cyan); text-decoration: none; transition: color 0.2s; }
    a:hover { color: #fff; }

    /* ========================================
       1. STICKY NAV
       ======================================== */
    .site-nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(10, 14, 20, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0, 212, 255, 0.08);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.5px;
    }

    .nav-logo img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      color: var(--frost-grey);
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--ice-cyan); }

    .nav-cta {
      border: 1px solid var(--ice-cyan);
      color: var(--ice-cyan) !important;
      padding: 8px 20px;
      border-radius: 6px;
      font-weight: 600;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .nav-cta:hover {
      background: rgba(0, 212, 255, 0.1);
      box-shadow: 0 0 16px var(--cyan-glow);
    }

    /* ========================================
       CONTENT AREA
       ======================================== */
    main {
      flex: 1;
      padding: 80px 24px;
    }

    .page-container {
      max-width: 800px;
      margin: 0 auto;
    }

    .page-header {
      margin-bottom: 60px;
      text-align: center;
    }

    .page-header h1 {
      font-family: var(--font-display);
      font-size: clamp(48px, 8vw, 72px);
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1.1;
      color: #fff;
      margin-bottom: 16px;
    }

    .overline {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ice-cyan);
      display: block;
      margin-bottom: 12px;
    }

    /* Typography for Markdown Content */
    .content-body {
      font-size: 18px;
      line-height: 1.7;
      color: #E0E8F0;
    }

    .content-body h2 {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      margin: 60px 0 24px;
      line-height: 1.2;
    }

    .content-body h3 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      color: var(--ice-cyan);
      margin: 40px 0 16px;
      line-height: 1.3;
    }

    .content-body p {
      margin-bottom: 24px;
      max-width: 65ch;
    }

    .content-body ul, .content-body ol {
      margin-bottom: 24px;
      padding-left: 24px;
    }

    .content-body li {
      margin-bottom: 12px;
    }

    .content-body blockquote {
      border-left: 4px solid var(--ice-cyan);
      background: var(--surface-blue);
      padding: 24px 32px;
      margin: 40px 0;
      border-radius: 0 8px 8px 0;
      font-style: italic;
      color: #fff;
    }

    .content-body blockquote p {
      margin-bottom: 0;
    }

    .content-body hr {
      border: 0;
      border-top: 1px solid rgba(0, 212, 255, 0.1);
      margin: 60px 0;
    }

    .content-body code {
      background: var(--surface-blue);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
      color: var(--ice-cyan);
    }

    .content-body strong {
      color: #fff;
    }

    /* Special Styling for Beta Instructions */
    .content-body .step-card {
      background: var(--night-blue);
      border: 1px solid rgba(0, 212, 255, 0.1);
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 32px;
    }

    /* ========================================
       FOOTER
       ======================================== */
    .site-footer {
      background: var(--deep-ice);
      border-top: 1px solid rgba(0, 212, 255, 0.08);
      padding: 60px 24px;
      text-align: center;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 32px;
      list-style: none;
      margin-bottom: 24px;
    }

    .footer-links a {
      color: var(--frost-grey);
      font-size: 14px;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--ice-cyan); }

    .footer-copy {
      color: rgba(136, 153, 170, 0.4);
      font-size: 13px;
    }

    /* ========================================
       RESPONSIVE
       ======================================== */
    @media (max-width: 600px) {
      .nav-links { display: none; }
      .page-header h1 { font-size: 42px; }
      .content-body h2 { font-size: 30px; }
      .content-body h3 { font-size: 24px; }
    }
  </style>
</head>
<body>

  <nav class="site-nav">
    <div class="nav-inner">
      <a href="{{ '/toi/' | relative_url }}" class="nav-logo">
        <img src="{{ '/toi/assets/icon.png' | relative_url }}" alt="Time On Ice" width="32" height="32">
        <span>Time On Ice</span>
      </a>
      <ul class="nav-links">
        <li><a href="{{ '/toi/#features' | relative_url }}">Features</a></li>
        <li><a href="{{ '/toi/#how-it-works' | relative_url }}">How It Works</a></li>
        <li><a href="{{ '/toi/#download' | relative_url }}" class="nav-cta">Get It Free</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <article class="page-container">
      <header class="page-header">
        <span class="overline">Time On Ice</span>
        <h1>{{ page.title }}</h1>
      </header>

      <div class="content-body">
        {{ content }}
      </div>
    </article>
  </main>

  <footer class="site-footer">
    <ul class="footer-links">
      <li><a href="{{ '/toi/privacy/' | relative_url }}">Privacy Policy</a></li>
      <li><a href="{{ '/toi/testers/' | relative_url }}">Beta Testers</a></li>
      <li><a href="mailto:hello@lr7.digital">Contact</a></li>
    </ul>
    <p class="footer-copy">&copy; 2026 lr7 digital. Wear OS is a trademark of Google LLC.</p>
  </footer>

</body>
</html>
